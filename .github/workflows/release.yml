name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            target: bun-darwin-arm64
            npm-dir: darwin-arm64
            binary: shire
          - runner: macos-15
            target: bun-darwin-x64
            npm-dir: darwin-x64
            binary: shire
          - runner: ubuntu-latest
            target: bun-linux-x64
            npm-dir: linux-x64
            binary: shire
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            npm-dir: linux-arm64
            binary: shire
          - runner: windows-latest
            target: bun-windows-x64
            npm-dir: win32-x64
            binary: shire.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Build binary and assets
        run: bun run scripts/build-binaries.ts local

      - name: Set version in package.json
        shell: bash
        env:
          PKG_VERSION: ${{ github.ref_name }}
        run: |
          cd npm/${{ matrix.npm-dir }}
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.PKG_VERSION.replace(/^v/, '');
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish platform package
        run: npm publish --access public
        working-directory: npm/${{ matrix.npm-dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm-dir }}
          path: npm/${{ matrix.npm-dir }}/

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"

      - name: Set version in meta-package
        shell: bash
        env:
          PKG_VERSION: ${{ github.ref_name }}
        run: |
          cd npm/agents-shire
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const version = process.env.PKG_VERSION.replace(/^v/, '');
            pkg.version = version;
            for (const key of Object.keys(pkg.optionalDependencies)) {
              pkg.optionalDependencies[key] = version;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish meta-package
        run: npm publish --access public
        working-directory: npm/agents-shire
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
