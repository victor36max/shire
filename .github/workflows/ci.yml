name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      MIX_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.4"
          elixir-version: "1.18.3"

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: mix-${{ runner.os }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix format --check-formatted
      - run: mix deps.unlock --check-unused
      - run: mix test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: assets

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/cache@v4
        with:
          path: assets/node_modules
          key: bun-frontend-${{ runner.os }}-${{ hashFiles('assets/bun.lock') }}
          restore-keys: bun-frontend-${{ runner.os }}-

      - run: bun install
      - run: bun run tsc --noEmit
      - run: bun run lint
      - run: bun run format:check
      - run: bun run test

  sprite:
    name: Agent Runner
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: priv/sprite

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/cache@v4
        with:
          path: priv/sprite/node_modules
          key: bun-sprite-${{ runner.os }}-${{ hashFiles('priv/sprite/bun.lock') }}
          restore-keys: bun-sprite-${{ runner.os }}-

      - run: bun install
      - run: bun run lint
      - run: bun run format:check
