app = 'shire-vps'
primary_region = 'nrt'

[build]

[deploy]
  release_command = '/app/bin/migrate'

[env]
  PHX_HOST = 'shire-vps.fly.dev'
  PORT = '8080'
  SHIRE_VM_TYPE = 'ssh'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2
